<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="/frontend/styles.css?v=20260330_ux1">
</head>
<body data-page="login">
  <header>
    <h1>Đăng nhập</h1>
    <nav id="topNav"></nav>
    <div id="userMeta"></div>
  </header>
  <main>
    <section class="card" style="max-width:560px;margin:auto;">
      <form id="loginForm">
        <label>Identifier (email hoặc số điện thoại)
          <input id="identifier" data-required="true" autocomplete="username">
        </label>
        <label>Mật khẩu
          <input id="password" type="password" data-required="true" autocomplete="current-password">
        </label>
        <button type="submit">Đăng nhập</button>
      </form>
      <p class="note">Chưa có tài khoản? <a href="/register">Đăng ký tại đây</a>.</p>
      <div id="loginMessage" class="message"></div>
    </section>
  </main>
  <script src="/frontend/app.js?v=20260330_ux1"></script>
  <script src="/frontend/pages.js?v=20260330_ux1"></script>
</body>
</html>
