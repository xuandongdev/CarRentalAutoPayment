<!doctype html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Hợp đồng thuê xe</title><link rel="stylesheet" href="/frontend/styles.css?v=20260330_ux1"></head>
<body data-page="renter_contracts"><header><h1>Hợp đồng thuê xe</h1><nav id="topNav"></nav><div id="userMeta"></div></header>
