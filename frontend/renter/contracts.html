<!doctype html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Hop dong thue xe</title><link rel="stylesheet" href="/frontend/styles.css?v=20260330_ux1"></head>
<body data-page="renter_contracts"><header><h1>Hợp dồng thuê xe</h1><nav id="topNav"></nav><div id="userMeta"></div></header>
<main class="grid">
  <section class="card">
    <h3>KHÓA CỌC</h3>
    <label>Hop dong<select id="lockContractId" data-required="true"></select></label>
    <button id="lockDepositBtn" type="button">Khóa tiền cọc</button>

    <h3>KHÁCH XÁC NHẬN NHẬN XE</h3>
    <form id="confirmReceiveForm">
      <label>Hợp đồng<select id="receiveContractId" data-required="true"></select></label>
      <label>Ghi chú nhận xe<textarea id="receiveNote" data-required="true"></textarea></label>
      <label>URL bằng chứng (mỗi dòng 1 URL)<textarea id="receiveEvidenceUrls"></textarea></label>
      <button type="submit">Xác nhận nhân xe</button>
    </form>

    <h3>KHÁCH TRẢ XE</h3>
    <form id="returnVehicleForm">
      <label>Họp đồng<select id="returnContractId" data-required="true"></select></label>
      <label>Ghi chú trả xe<textarea id="returnNote" data-required="true"></textarea></label>
      <label>URL bằng chứng (mỗi dòng 1 URL)<textarea id="returnEvidenceUrls"></textarea></label>
      <button type="submit">Xác nhận trả xe</button>
    </form>

    <h3>TẤT TOÁN</h3>
    <form id="settleForm">
      <label>Họp đồng<select id="settleContractId" data-required="true"></select></label>
      <label>Tổng tiền thanh tóan (auto)<input id="tongTienThanhToan" readonly></label>
      <label>Tổng tiền hòan lai (auto)<input id="tongTienHoanLai" readonly></label>
      <button type="submit">Thực hiên tất tóan</button>
    </form>
    <div id="renterContractsMessage" class="message"></div>
  </section>
  <section class="card">
    <h3>Danh sách họp đồng</h3>
    <div id="renterContractsTable"></div>
  </section>
</main>
<script src="/frontend/app.js?v=20260402_flow2"></script><script src="/frontend/pages.js?v=20260402_flow2"></script></body></html>
