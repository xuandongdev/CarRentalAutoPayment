<!doctype html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Hư hại và tranh chấp</title><link rel="stylesheet" href="/frontend/styles.css?v=20260330_ux1"></head>
<body data-page="owner_disputes"><header><h1>Hư hại và tranh chấp</h1><nav id="topNav"></nav><div id="userMeta"></div></header>
<main class="owner-workspace">
  <section class="card owner-page-head">
    <h2>Tranh chấp</h2>
    <p class="note">Gửi báo cáo hư hại và theo dõi trạng thái xử lý trên một luồng thống nhất.</p>
  </section>

  <section class="card">
    <div class="owner-action-bar">
      <div class="owner-filters">
        <label>Tìm kiếm tranh chấp<input id="ownerDisputeSearch" placeholder="Mã tranh chấp, hợp đồng, lý do"></label>
        <label>Trạng thái
          <select id="ownerDisputeStatusFilter">
            <option value="">Tất cả</option>
            <option value="moiTao">Mới tạo</option>
            <option value="choAdminXacMinh">Chờ admin xác minh</option>
            <option value="daDong">Đã đóng</option>
          </select>
        </label>
      </div>
      <button id="toggleOwnerDisputeFormBtn" type="button">Tạo báo cáo hư hại</button>
    </div>
    <div id="ownerDisputesTable"></div>
    <div id="ownerDisputesEmpty" class="empty-state owner-hide">Chưa có tranh chấp nào. Bạn có thể gửi báo cáo hư hại khi cần.</div>
    <div id="ownerDisputesMessage" class="message"></div>
  </section>

  <section id="ownerDisputeDetailPanel" class="card owner-hide">
    <h3>Chi tiết tranh chấp</h3>
    <div id="ownerDisputeDetail"></div>
  </section>

  <section id="ownerDisputeFormPanel" class="card owner-form-panel owner-hide">
    <div class="owner-form-head">
      <h3>Tạo báo cáo hư hại</h3>
      <button id="closeOwnerDisputeFormBtn" type="button" class="table-action-btn">Đóng</button>
    </div>
    <form id="ownerDamageForm" class="owner-form-grid">
      <label>Hợp đồng<select id="contractId" data-required="true"></select></label>
      <label>Chi phí dự kiến<input id="estimatedCost" type="number" min="0" step="0.01"></label>
      <label class="owner-span-2">Lý do hư hại<textarea id="lyDo" data-required="true" placeholder="Mô tả ngắn gọn tình trạng hư hại"></textarea></label>
      <label class="owner-span-2">URL bằng chứng (mỗi dòng 1 URL)<textarea id="evidenceUrls" placeholder="https://..."></textarea></label>
      <label class="owner-span-2">Ghi chú<textarea id="ownerGhiChu" placeholder="Thông tin bổ sung nếu có"></textarea></label>
      <button type="submit">Gửi báo cáo</button>
    </form>
  </section>
</main>
<script src="/frontend/app.js?v=20260330_ux1"></script><script src="/frontend/pages.js?v=20260330_ux1"></script></body></html>
