<!doctype html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Dashboard chủ xe</title><link rel="stylesheet" href="/frontend/styles.css?v=20260330_ux1"></head>
<body data-page="owner_dashboard"><header><h1>Dashboard chủ xe</h1><nav id="topNav"></nav><div id="userMeta"></div></header>
<main class="owner-workspace">
  <section class="card owner-page-head">
    <h2>Workspace chủ xe</h2>
    <p class="note">Theo dõi xe, hợp đồng và các việc cần xử lý trong một màn hình.</p>
    <p id="welcomeUser" class="note"></p>
    <div id="ownerQuickActions" class="cta-row"></div>
  </section>

  <section class="card">
    <div class="summary">
      <div class="kpi"><div class="label">Tổng xe</div><div id="kpiVehicles" class="value">0</div></div>
      <div class="kpi"><div class="label">Xe chờ duyệt</div><div id="kpiPending" class="value">0</div></div>
      <div class="kpi"><div class="label">Xe đang thuê</div><div id="kpiActiveRent" class="value">0</div></div>
      <div class="kpi"><div class="label">Hợp đồng active</div><div id="kpiContracts" class="value">0</div></div>
      <div class="kpi"><div class="label">Tranh chấp mở</div><div id="kpiDisputes" class="value">0</div></div>
    </div>
    <div id="ownerDashboardMessage" class="message"></div>
  </section>

  <section class="card">
    <h3>Action Queue</h3>
    <div id="ownerActionQueue" class="queue-grid"></div>
  </section>

  <section class="card">
    <h3>Xe gần đây</h3>
    <div id="ownerRecentVehicles"></div>
  </section>

  <section class="card">
    <h3>Hợp đồng active gần đây</h3>
    <div id="ownerActiveContracts"></div>
  </section>

  <section class="card">
    <h3>Tranh chấp mới</h3>
    <div id="ownerRecentDisputes"></div>
  </section>
</main>
<script src="/frontend/app.js?v=20260330_ux1"></script><script src="/frontend/pages.js?v=20260330_ux1"></script></body></html>
