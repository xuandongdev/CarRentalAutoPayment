<!doctype html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Họp đồng chủ xe</title><link rel="stylesheet" href="/frontend/styles.css?v=20260330_ux1"></head>
<body data-page="owner_contracts"><header><h1>Họp đồng chủ xe</h1><nav id="topNav"></nav><div id="userMeta"></div></header>
<main class="owner-workspace">
  <section class="card owner-page-head">
    <h2>Họp đồng</h2>
  </section>

  <section class="card">
    <div class="owner-action-bar">
      <div class="owner-filters">
        <label>Tìm kiếm họp đồng<input id="ownerContractSearch" placeholder="Ma hop dong, bien so, khach thue"></label>
        <label>Trạng thái
          <select id="ownerContractStatusFilter">
            <option value="">Tất cả</option>
            <option value="khoiTao">Khoi tao</option>
            <option value="choChuXacNhanGiaoXe">Chờ chủ xe xác nhận giao xe</option>
            <option value="choKhachNhanXe">Chờ khách xác nhận nhận xe</option>
            <option value="dangThue">Đang thuê</option>
            <option value="choChuXacNhanTraXe">Chờ chủ xe xác nhận trả xe</option>
            <option value="choTatToan">Chờ khách tất toán</option>
            <option value="dangTranhChap">Đang tranh chấp</option>
            <option value="hoanThanh">Hoàn thành</option>
          </select>
        </label>
      </div>
      <a href="/owner/disputes" class="btn-link secondary">Báo cáo hư hại</a>
    </div>

    <div class="owner-action-bar" style="margin-top: 12px;">
      <form id="ownerConfirmHandoverForm" class="owner-inline-form">
        <label>Chủ xác nhận giao xe
          <select id="ownerHandoverContractId" data-required="true"></select>
        </label>
        <label>Ghi chú
          <input id="ownerHandoverNote" data-required="true" placeholder="Xe đã bàn giao cho khách">
        </label>
        <button type="submit" class="btn-link">Xác nhận giao xe</button>
      </form>
      <form id="ownerConfirmReturnForm" class="owner-inline-form">
        <label>Chủ xác nhận nhận lại xe
          <select id="ownerReturnContractId" data-required="true"></select>
        </label>
        <label>Ghi chú
          <input id="ownerReturnNote" data-required="true" placeholder="Đã nhận lại xe từ khách">
        </label>
        <button type="submit" class="btn-link">Xác nhận trả xe</button>
      </form>
    </div>

    <div id="ownerContractsTable"></div>
    <div id="ownerContractsEmpty" class="empty-state owner-hide">Chưa có hợp đồng nào liên quan tới tài khoản của bạn.</div>
    <div id="ownerContractsMessage" class="message"></div>
  </section>

  <section id="ownerContractDetailPanel" class="card owner-hide">
    <h3>Chi tiết hợp đồng</h3>
    <div id="ownerContractDetail"></div>
  </section>
</main>
<script src="/frontend/app.js?v=20260402_flow2"></script><script src="/frontend/pages.js?v=20260402_flow2"></script></body></html>
